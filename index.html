<!DOCTYPE html>
<html>
<head>
    <title>我的跑团游戏</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        #game-interface { display: none; } /* 默认隐藏游戏界面 */
        #login-screen { display: block; }  /* 默认显示登录界面 */
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>进入跑团游戏</h1>
        <p>请输入你的 Gemini API Key:</p>
        <input type="password" id="apiKeyInput" placeholder="输入 API Key">
        <button onclick="saveApiKey()">开始游戏</button>
    </div>

    <div id="game-interface">
        <h1>跑团进行中</h1>
        <div id="responseArea" style="white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll;"></div>
        <input type="text" id="userInput" placeholder="输入你的指令...">
        <button onclick="sendToServer()">发送</button>
        <button onclick="logout()">退出账号</button>
    </div>

    <script>
        const GAME_RULES = "你是一个跑团主持人。这是你的设定：[粘贴你的JSON规则]。玩家输入的每一次操作，都必须基于这些数值判定。";

        // 检查是否已经存了Key
        window.onload = () => {
            if (localStorage.getItem('gemini_key')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-interface').style.display = 'block';
            }
        };

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value;
            if (key) {
                localStorage.setItem('gemini_key', key);
                location.reload(); // 刷新以进入游戏
            }
        }

        function logout() {
            localStorage.removeItem('gemini_key');
            location.reload();
        }

        async function sendToServer() {
            const userInput = document.getElementById('userInput').value;
            const responseArea = document.getElementById('responseArea');
            const apiKey = localStorage.getItem('gemini_key');

            responseArea.innerText += "\n[我]: " + userInput + "\n正在思考...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{ "parts": [{ "text": GAME_RULES + "\n玩家操作：" + userInput }] }]
                    })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                responseArea.innerText += "\n[主持人]: " + reply;
            } catch (e) {
                responseArea.innerText += "\n[错误]: API Key 无效或网络问题。";
            }
        }
    </script>
</body>
</html>
