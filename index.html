<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大荒百世传奇 - 轮回修仙模拟器</title>
    <style>
        body { background-color: #121212; color: #d4d4d4; font-family: 'Kaiti', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 800px; border: 1px solid #444; padding: 20px; background: #1a1a1a; }
        #game-interface { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
        button { padding: 10px 20px; cursor: pointer; background: #8c221a; color: white; border: none; }
    </style>
</head>
<body>

<div id="login-screen" class="box">
    <h1>欢迎进入大荒世界</h1>
    <p>请输入你的 Gemini API Key 以开启轮回（Key 仅保存在你的浏览器中）：</p>
    <input type="password" id="apiKeyInput" placeholder="AIza...">
    <button onclick="saveApiKey()">开启轮回</button>
</div>

<div id="game-interface" class="box">
    <h1>轮回修仙进行中</h1>
    <div id="responseArea" style="height: 400px; overflow-y: scroll; border: 1px solid #333; padding: 10px; margin-bottom: 10px; white-space: pre-wrap;"></div>
    <input type="text" id="userInput" placeholder="输入你的修仙指令...">
    <button onclick="sendToServer()">发送指令</button>
    <button onclick="logout()" style="background:#555;">退出轮回</button>
</div>

<script>
    // 你的游戏核心设定逻辑（嵌入了 JSON 中的 world_book 等核心指令）
    const SYSTEM_PROMPT = `你是一个冷酷的修仙游戏主持人，遵循以下设定：
    1. 观察者视角：精确记录人、神、魔三界的演变。
    2. 文风要求：古典仙侠风格，严禁出现现代科技词汇。
    3. 判定逻辑：每一轮输出必须包含：【天道运转】（思维链）、正文、面板（命格/众生/记忆回廊/天机玄示）。
    4. 轮回机制：主角死亡后转世记录。
    5. 严禁替玩家做决定。
    详细世界观设定：[在此处粘贴你JSON里的 world_book 详细内容]`;

    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value;
        if (key.startsWith("AIza")) {
            localStorage.setItem('gemini_key', key);
            location.reload();
        } else {
            alert("API Key 格式似乎不对，请检查！");
        }
    }

    function logout() {
        localStorage.removeItem('gemini_key');
        location.reload();
    }

    window.onload = () => {
        if (localStorage.getItem('gemini_key')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'block';
        }
    };

    async function sendToServer() {
        const userInput = document.getElementById('userInput').value;
        const responseArea = document.getElementById('responseArea');
        const apiKey = localStorage.getItem('gemini_key');

        responseArea.innerText += "\n\n> " + userInput + "\n(天道演算中...)";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "contents": [{ "parts": [{ "text": SYSTEM_PROMPT + "\n\n玩家操作：" + userInput }] }]
                })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            responseArea.innerText = "主持人: " + reply;
        } catch (e) {
            responseArea.innerText += "\n[错误]: 连接失败，请检查 API Key 是否有效。";
        }
    }
</script>
</body>
</html>
