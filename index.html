<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大荒百世传奇 - 轮回修仙模拟器</title>
    <style>
        body { background-color: #121212; color: #d4d4d4; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 800px; border: 1px solid #444; padding: 20px; background: #1a1a1a; }
        input { width: 95%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; }
        button { padding: 10px 20px; cursor: pointer; background: #8c221a; color: white; border: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-interface" class="box">
    <h1>轮回修仙进行中</h1>
    <div id="responseArea" style="height: 400px; overflow-y: scroll; border: 1px solid #333; padding: 10px; margin-bottom: 10px; white-space: pre-wrap;"></div>
    <input type="text" id="userInput" placeholder="输入修仙指令...">
    <button onclick="sendToServer()">发送指令</button>
</div>

<script>
    const GAME_RULES = "你是一个冷酷的RPG掌局者，精通东方玄幻，扮演天道规则。每一轮输出必须包含：【天道运转】（思维链）、正文、面板（命格/众生/记忆回廊/天机玄示）。严禁爽文文风，字数保持在800-1000字，严禁现代词汇。";

    async function sendToServer() {
        const userInput = document.getElementById('userInput').value;
        const responseArea = document.getElementById('responseArea');

        if (!userInput) return alert("请输入指令");
        responseArea.innerText += "\n\n> " + userInput + "\n(天道演算中...)";

        try {
            // 直接请求自己服务器的 /api/chat，Key 在服务器端由环境变量处理
            const response = await fetch("/api/chat", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: GAME_RULES + "\n\n玩家操作：" + userInput 
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "服务器请求失败");
            }

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            responseArea.innerText += "\n\n主持人: " + reply;
            document.getElementById('userInput').value = ""; // 清空输入框
        } catch (e) {
            responseArea.innerText += "\n[错误]: " + e.message;
        }
    }
</script>
</body>
</html>
