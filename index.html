<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大荒百世传奇 - 轮回修仙</title>
    <style>
        body { background: #121212; color: #eee; padding: 20px; font-family: sans-serif; }
        .box { max-width: 800px; margin: auto; border: 1px solid #444; padding: 20px; background: #1a1a1a; }
        #game-interface { display: none; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen" class="box">
    <h1>欢迎进入大荒世界</h1>
    <input type="password" id="apiKeyInput" placeholder="请输入你的 API Key">
    <button onclick="saveApiKey()">开启轮回</button>
</div>

<div id="game-interface" class="box">
    <div id="responseArea" style="height: 400px; overflow-y: scroll; border: 1px solid #333; padding: 10px;"></div>
    <input type="text" id="userInput" placeholder="输入指令...">
    <button onclick="sendToServer()">发送</button>
</div>

<script>
    const SYSTEM_RULES = "你是一个冷酷的修仙游戏主持人，遵循以下设定：1.观察者视角，精确记录演变。2.严禁现代科技词汇。3.每一轮输出必须包含：【天道运转】（思维链）、正文、面板（命格/众生/记忆回廊/天机玄示）。4.严禁替玩家做决定。";

    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value;
        localStorage.setItem('gemini_key', key);
        location.reload();
    }

    async function sendToServer() {
        const userInput = document.getElementById('userInput').value;
        const responseArea = document.getElementById('responseArea');
        const apiKey = localStorage.getItem('gemini_key');
        
        responseArea.innerHTML += `<p><b>你:</b> ${userInput}</p>`;

        try {
            // 使用完全路径，避免任何路径解析错误
            const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "contents": [{ "parts": [{ "text": SYSTEM_RULES + "\n\n玩家输入：" + userInput }] }]
                })
            });

            const data = await response.json();
            if (data.error) {
                responseArea.innerHTML += `<p style="color:red;">API错误: ${data.error.message}</p>`;
            } else {
                const reply = data.candidates[0].content.parts[0].text;
                responseArea.innerHTML += `<p><b>主持人:</b> ${reply}</p>`;
            }
        } catch (err) {
            responseArea.innerHTML += `<p style="color:red;">连接彻底失败，请检查浏览器是否开启了拦截插件（如uBlock, AdBlock），或尝试更换浏览器。</p>`;
        }
    }

    window.onload = () => {
        if (localStorage.getItem('gemini_key')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'block';
        }
    };
</script>
</body>
</html>
